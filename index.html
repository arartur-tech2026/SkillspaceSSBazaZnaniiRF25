<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>База знаний РФ – ЕГЭ Обществознание</title>
  <style>
    /* --- ПЕРЕМЕННЫЕ И ТЕМЫ --- */
    :root {
      --bg-main: #f8fafc;
      --bg-surface: #ffffff;
      --bg-splash: #ffffff;
      --text-main: #0f172a;
      --text-muted: #475569;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-hover: #1d4ed8;
      --card-bg: #ffffff;
      --card-back-bg: #f1f5f9;
      --border: #e2e8f0;
      --line-color: #cbd5e1;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    [data-theme="dark"] {
      --bg-main: #0f172a;
      --bg-surface: #1e293b;
      --bg-splash: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-soft: rgba(59, 130, 246, 0.2);
      --accent-hover: #60a5fa;
      --card-bg: #1e293b;
      --card-back-bg: #0f172a;
      --border: #334155;
      --line-color: #475569;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent; 
      word-break: normal;
      overflow-wrap: break-word; 
    }

    /* АГРЕССИВНЫЙ ФИКС СКРОЛЛА ДЛЯ iOS/iPadOS IFRAME */
    html, body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.4;
      position: fixed; 
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      overflow: hidden; 
      overscroll-behavior: none; 
      touch-action: none; 
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    svg { width: 1.25rem; height: 1.25rem; fill: currentColor; flex-shrink: 0; }

    /* --- ЗАСТАВКА (SPLASH SCREEN) --- */
    #splash-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--bg-splash);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      text-align: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
      overflow: hidden;
      touch-action: none;
    }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    
    .splash-icon {
      width: min(80px, 12vh); height: min(80px, 12vh);
      color: var(--accent);
      margin-bottom: min(1.5rem, 3vh);
    }
    .splash-title {
      font-size: clamp(1.5rem, 6vw, 2.5rem); font-weight: 800;
      margin-bottom: min(1rem, 2vh); line-height: 1.2;
    }
    .splash-desc {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem); color: var(--text-muted);
      margin-bottom: min(2.5rem, 4vh); max-width: 500px; line-height: 1.4; padding: 0 10px;
    }
    .btn-start {
      background-color: var(--accent); color: #ffffff; border: none;
      padding: min(1rem, 2vh) min(3rem, 6vw); font-size: clamp(0.95rem, 3vw, 1.1rem); font-weight: 700;
      border-radius: 99px; cursor: pointer; box-shadow: var(--shadow-md);
      animation: pulse 2s infinite; transition: transform 0.2s ease;
    }
    .btn-start:active { transform: scale(0.95); }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
    }
    [data-theme="dark"] .btn-start { animation: pulse-dark 2s infinite; }
    @keyframes pulse-dark {
      0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
      100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
    }

    /* Анимация появления карточек */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- ИНТЕРФЕЙС --- */
    #app-ui {
      display: flex; flex-direction: column; height: 100%; opacity: 0; visibility: hidden;
      transition: opacity 0.5s ease 0.2s, visibility 0.5s ease 0.2s;
    }
    #app-ui.visible { opacity: 1; visibility: visible; }

    /* Шапка */
    .header {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: clamp(8px, 2vh, 12px) clamp(10px, 3vw, 15px);
      background-color: var(--bg-surface); border-bottom: 1px solid var(--border); z-index: 10; gap: 10px;
    }
    .header-title { font-size: clamp(1.1rem, 4vw, 1.4rem); font-weight: 800; color: var(--text-main); }
    .header-controls { display: flex; gap: clamp(4px, 1.5vw, 8px); flex-shrink: 0; }
    .btn-icon {
      background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-main);
      width: clamp(30px, 9vw, 36px); height: clamp(30px, 9vw, 36px); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: var(--shadow-sm); transition: transform 0.2s;
    }
    .btn-icon:active { transform: scale(0.9); }
    
    /* Меню категорий (Горизонтальный скролл) */
    .categories-bar {
      display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px;
      background-color: var(--bg-main); border-bottom: 1px solid var(--border);
      touch-action: pan-x; overscroll-behavior: contain; flex-shrink: 0;
      /* Скрытие стандартного скроллбара, но оставляем возможность перетаскивания */
      scrollbar-width: none; -ms-overflow-style: none;
      cursor: grab;
    }
    .categories-bar:active { cursor: grabbing; }
    .categories-bar::-webkit-scrollbar { display: none; }
    
    .cat-btn {
      padding: 8px 16px; font-size: 0.9rem; font-weight: 700;
      border-radius: 99px; cursor: pointer; color: var(--text-muted);
      border: 1px solid var(--border); background: var(--bg-surface);
      transition: all 0.2s; white-space: nowrap; flex-shrink: 0; box-shadow: var(--shadow-sm);
      user-select: none;
    }
    .cat-btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* Инструкция */
    .instruction-bar {
      background-color: var(--accent-soft); color: var(--accent);
      padding: clamp(6px, 1.5vh, 10px) 15px; text-align: center; 
      font-size: clamp(0.75rem, 3vw, 0.9rem); font-weight: 600;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    /* --- РАБОЧАЯ ЗОНА (КАРТОЧКИ) --- */
    .workspace {
      flex: 1; overflow-y: auto; padding: 20px 15px;
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
      background-color: var(--bg-bank);
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* Механика Flip Card */
    .flip-card {
      background-color: transparent; width: 100%; aspect-ratio: 4 / 3; min-height: 220px;
      perspective: 1000px; cursor: pointer; opacity: 0;
    }
    .flip-card-inner {
      position: relative; width: 100%; height: 100%; text-align: center;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d;
      box-shadow: var(--shadow-md); border-radius: var(--radius-lg);
    }
    .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }

    .flip-card-front, .flip-card-back {
      position: absolute; width: 100%; height: 100%;
      -webkit-backface-visibility: hidden; backface-visibility: hidden;
      border-radius: var(--radius-lg); padding: 20px;
      display: flex; flex-direction: column; justify-content: center;
      border: 1px solid var(--border); overflow: hidden;
    }
    
    .flip-card-front {
      background-color: var(--card-bg); align-items: center;
    }
    .card-icon {
      width: 48px; height: 48px; color: var(--accent); margin-bottom: 15px;
      background: var(--accent-soft); padding: 10px; border-radius: 50%;
    }
    .card-title { font-size: 1.2rem; font-weight: 800; color: var(--text-main); }
    .card-hint { font-size: 0.8rem; color: var(--accent); font-weight: 700; margin-top: 15px; text-transform: uppercase; letter-spacing: 0.05em; }

    .flip-card-back {
      background-color: var(--card-back-bg); transform: rotateY(180deg);
      align-items: flex-start; text-align: left; justify-content: flex-start;
      overflow-y: auto; touch-action: pan-y;
      -webkit-overflow-scrolling: touch; scrollbar-width: thin;
    }
    .flip-card-back::-webkit-scrollbar { width: 4px; }
    .flip-card-back::-webkit-scrollbar-thumb { background: var(--line-color); border-radius: 4px; }
    
    .back-title { font-size: 0.9rem; font-weight: 800; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid var(--line-color); padding-bottom: 5px; width: 100%; }
    .facts-list { list-style: none; padding: 0; margin: 0; width: 100%; }
    .facts-list li {
      font-size: 0.9rem; color: var(--text-main); margin-bottom: 10px; line-height: 1.4;
      position: relative; padding-left: 16px;
    }
    .facts-list li::before {
      content: "•"; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.2rem; top: -4px;
    }
    
  </style>
</head>

    // --- АГРЕССИВНЫЙ ФИКС СКРОЛЛА (iOS / IFRAME) ---
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) return;
      
      const workspace = e.target.closest('.workspace');
      const categoriesBar = e.target.closest('.categories-bar');
      const cardBack = e.target.closest('.flip-card-back');

      let scrollable = cardBack || workspace || categoriesBar;

      if (scrollable) {
        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const dx = touchX - (scrollable.lastTouchX || touchX);
        const dy = touchY - (scrollable.lastTouchY || touchY);
        
        scrollable.lastTouchX = touchX;
        scrollable.lastTouchY = touchY;

        if (scrollable.classList.contains('categories-bar')) {
            const isAtLeft = scrollable.scrollLeft === 0;
            const isAtRight = scrollable.scrollWidth - scrollable.scrollLeft <= scrollable.clientWidth + 1;
            if ((isAtLeft && dx > 0) || (isAtRight && dx < 0)) {
                if (e.cancelable) e.preventDefault();
            }
        } else {
            const isAtTop = scrollable.scrollTop === 0;
            const isAtBottom = scrollable.scrollHeight - scrollable.scrollTop <= scrollable.clientHeight + 1;
            if ((isAtTop && dy > 0) || (isAtBottom && dy < 0)) {
                if (e.cancelable) e.preventDefault();
            }
        }
      } else {
        if (e.cancelable) e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('touchstart', function(e) {
      const scrollable = e.target.closest('.workspace, .categories-bar, .flip-card-back');
      if (scrollable) {
        scrollable.lastTouchX = e.touches[0].clientX;
        scrollable.lastTouchY = e.touches[0].clientY;
      }
    }, { passive: false });

    // --- ЛОГИКА ГОРИЗОНТАЛЬНОГО DRAG-TO-SCROLL (ДЛЯ ПК) ---
    const categoriesBar = document.getElementById('categories-bar');
    let isDown = false;
    let startX;
    let scrollLeft;
    let isDragging = false;

    categoriesBar.addEventListener('mousedown', (e) => {
      isDown = true;
      isDragging = false;
      categoriesBar.style.cursor = 'grabbing';
      startX = e.pageX - categoriesBar.offsetLeft;
      scrollLeft = categoriesBar.scrollLeft;
    });
    categoriesBar.addEventListener('mouseleave', () => {
      isDown = false;
      categoriesBar.style.cursor = 'grab';
    });
    categoriesBar.addEventListener('mouseup', () => {
      isDown = false;
      categoriesBar.style.cursor = 'grab';
      // Небольшая задержка, чтобы предотвратить случайный "клик" при отпускании мыши
      setTimeout(() => isDragging = false, 50);
    });
    categoriesBar.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      isDragging = true;
      const x = e.pageX - categoriesBar.offsetLeft;
      const walk = (x - startX) * 2; // Ускоритель скролла
      categoriesBar.scrollLeft = scrollLeft - walk;
    });

    // --- ЛОГИКА РЕНДЕРИНГА И ФИЛЬТРАЦИИ ---
    const cardsGrid = document.getElementById('cards-grid');
    const catBtns = document.querySelectorAll('.cat-btn');

    function renderCards(filter = 'all') {
      cardsGrid.innerHTML = '';
      
      const filteredData = filter === 'all' ? factsData : factsData.filter(item => item.category === filter);
      
      filteredData.forEach((item, index) => {
        const factsHTML = item.facts.map(fact => `<li>${fact}</li>`).join('');
        
        const card = document.createElement('div');
        card.className = 'flip-card';
        card.style.animation = `fadeIn 0.5s ease forwards ${index * 0.05}s`;
        
        card.innerHTML = `
          <div class="flip-card-inner">
            <div class="flip-card-front">
              <svg class="card-icon"><use href="#${item.icon}"></use></svg>
              <div class="card-title">${item.title}</div>
              <div class="card-hint">Нажми, чтобы выучить</div>
            </div>
            <div class="flip-card-back">
              <div class="back-title">${item.title}</div>
              <ul class="facts-list">
                ${factsHTML}
              </ul>
            </div>
          </div>
        `;
        
        card.addEventListener('click', function() {
          this.classList.toggle('is-flipped');
          if(navigator.vibrate) navigator.vibrate(15);
        });

        cardsGrid.appendChild(card);
      });
    }

    catBtns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        // Блокируем клик, если пользователь просто перетаскивал меню мышкой
        if (isDragging) {
           e.preventDefault();
           return;
        }

        catBtns.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        
        const filter = e.target.dataset.filter;
        renderCards(filter);
        if(navigator.vibrate) navigator.vibrate(15);
      });
    });

    // --- СИСТЕМНЫЕ ФУНКЦИИ ---
    const htmlEl = document.documentElement;
    function requestFullScreenSafe() {
      try {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (htmlEl.requestFullscreen) {
            const req = htmlEl.requestFullscreen();
            if (req && typeof req.catch === 'function') req.catch(() => {});
          } else if (htmlEl.webkitRequestFullscreen) {
            htmlEl.webkitRequestFullscreen(); 
          }
        }
      } catch (e) { console.warn("Fullscreen API не поддерживается:", e); }
    }

    document.getElementById('btn-fullscreen').addEventListener('click', () => {
      try {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) requestFullScreenSafe();
        else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      } catch (e) {}
    });

    const updateFullscreenIcon = () => {
      const isFull = document.fullscreenElement || document.webkitFullscreenElement;
      document.getElementById('icon-fullscreen-use').setAttribute('href', isFull ? '#icon-minimize' : '#icon-maximize');
    };
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    document.getElementById('btn-theme').addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      htmlEl.setAttribute('data-theme', currentTheme);
      document.getElementById('icon-theme-use').setAttribute('href', currentTheme === 'light' ? '#icon-moon' : '#icon-sun');
    });

    document.getElementById('btn-start').addEventListener('click', () => {
      try { requestFullScreenSafe(); } catch (e) {}
      const splashScreen = document.getElementById('splash-screen');
      splashScreen.classList.add('hidden');
      setTimeout(() => {
        splashScreen.style.display = 'none';
        document.getElementById('app-ui').classList.add('visible');
        renderCards('all'); 
      }, 500);
    });

  </script>
